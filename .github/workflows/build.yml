name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywebview pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "ShieldGUI" `
            --add-data "ui;ui" `
            --hidden-import webview `
            --hidden-import webview.platforms.win32_edge `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShieldGUI-windows-${{ matrix.python-version }}
          path: dist/ShieldGUI.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Shield GUI ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: dist/ShieldGUI.exe
          fail_on_unmatched_files: true
